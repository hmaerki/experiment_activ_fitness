<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- PyScript -->
    <link
      rel="stylesheet"
      href="https://pyscript.net/releases/2026.3.1/core.css"
    />
    <script
      type="module"
      src="https://pyscript.net/releases/2026.3.1/core.js"
    ></script>

    <link rel="stylesheet" href="./assets/styles.css" />

    <!-- Loading splash -->
    <script type="module">
      const loading = document.getElementById("loading");
      addEventListener("py:ready", () => loading.close());
      loading.showModal();
    </script>

    <title>Activ Fitness</title>
    <link rel="icon" href="https://www.activfitness.ch/favicon.ico" />
  </head>

  <body>
    <dialog id="loading">
      <h1>Loading…</h1>
    </dialog>

    <header>
      <img src="https://www.activfitness.ch/app/themes/activfitness/public/images/activfitness-logo.2fc6df.svg" alt="Activ Fitness" class="header-logo" />
    </header>

    <main>
      <!-- ── View: Workouts list ───────────────────────────────── -->
      <section id="view-workouts">
        <button id="btn-new-workout" class="primary">+ New workout</button>
        <ul id="workouts-list"></ul>
      </section>

      <!-- ── View: Single workout ─────────────────────────────── -->
      <section id="view-workout" hidden>
        <button id="btn-back-to-workouts" class="back-btn">← Workouts</button>
        <h2 id="workout-date"></h2>
        <ul id="exercises-list"></ul>
        <button id="btn-delete-workout" class="secondary" style="margin-top:1rem;color:#c62828;">🗑 Delete this workout</button>
      </section>

      <!-- ── View: Exercise detail ─────────────────────────────── -->
      <section id="view-exercise" hidden>
        <div id="exercise-detail-card" class="detail-card">
          <p class="exercise-title"><span id="exercise-key"></span> <span id="exercise-short"></span></p>
          <p id="exercise-comment" class="exercise-comment"></p>
          <div class="weight-row">
            <label for="exercise-weight">Weight:</label>
            <input
              type="number"
              id="exercise-weight"
              step="0.5"
              min="0"
            />
            <span class="unit">kg</span>
          </div>
          <div class="weight-row">
            <label for="exercise-repetitions">Repetitions:</label>
            <input
              type="number"
              id="exercise-repetitions"
              step="1"
              min="1"
            />
          </div>
          <div class="btn-row">
            <button id="btn-cancel" class="secondary"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg> Cancel</button>
            <button id="btn-done" class="primary">Done <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></button>
          </div>
        </div>
      </section>
    </main>

    <script type="py" src="./main.py" config="./pyscript.toml"></script>
  </body>
</html>
