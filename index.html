<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- PyScript -->
    <link
      rel="stylesheet"
      href="https://pyscript.net/releases/2026.3.1/core.css"
    />
    <script
      type="module"
      src="https://pyscript.net/releases/2026.3.1/core.js"
    ></script>

    <link rel="stylesheet" href="./assets/styles.css" />

    <!-- Loading splash -->
    <script type="module">
      const loading = document.getElementById("loading");
      const closeLoading = () => loading.close();
      addEventListener("py:ready", closeLoading);
      addEventListener("mpy:ready", closeLoading);
      loading.showModal();
    </script>

    <title>Activ Fitness</title>
    <link rel="icon" href="https://www.activfitness.ch/favicon.ico" />
  </head>

  <body>
    <!-- ── Hans im Glück walker ──────────────────────────────── -->
    <img id="hans-walker" src="./assets/hans_im_glueck.svg" alt="" aria-hidden="true" />

    <!-- ── SVG arrow symbols ──────────────────────────────────── -->
    <svg hidden style="display:none" xmlns="http://www.w3.org/2000/svg">
      <symbol id="arrow-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
      </symbol>
      <symbol id="arrow-right" viewBox="0 0 24 24">
        <use href="#arrow-left" transform="scale(-1,1) translate(-24,0)"/>
      </symbol>
    </svg>

    <dialog id="loading">
      <h1>Loading…</h1>
    </dialog>

    <header>
      <img src="https://www.activfitness.ch/app/themes/activfitness/public/images/activfitness-logo.2fc6df.svg" alt="Activ Fitness" class="header-logo" />
      <span id="who-name" style="color:#fff;font-size:1.1rem;font-weight:600;margin-left:auto;"></span>
    </header>

    <main>
      <!-- ── View: Workouts list ───────────────────────────────── -->
      <section id="view-workouts">
        <button id="btn-new-workout" class="primary">New workout <svg><use href="#arrow-right"/></svg></button>
        <ul id="workouts-list"></ul>
      </section>

      <!-- ── View: Single workout ─────────────────────────────── -->
      <section id="view-workout" hidden>
        <button id="btn-back-to-workouts" class="secondary"><svg><use href="#arrow-left"/></svg>Workouts</button>
        <h2 id="workout-date"></h2>
        <ul id="exercises-list"></ul>
        <div class="btn-row" style="margin-top:1rem;">
          <button id="btn-show-json" class="secondary">Show JSON</button>
          <button id="btn-delete-workout" class="secondary">Delete this workout</button>
        </div>
      </section>

      <!-- ── View: JSON ──────────────────────────────────────────── -->
      <section id="view-json" hidden>
        <button id="btn-back-from-json" class="secondary"><svg><use href="#arrow-left"/></svg>Back</button>
        <h2>Workout JSON</h2>
        <textarea id="json-content" rows="24" style="width:100%;font-family:monospace;font-size:0.85rem;padding:1rem;border-radius:var(--radius);border:1px solid #ccc;background:var(--card);box-sizing:border-box;"></textarea>
        <p id="json-error" style="color:var(--primary);font-weight:600;"></p>
        <div class="btn-row" style="margin-top:0.5rem;">
          <button id="btn-back-from-json2" class="secondary"><svg><use href="#arrow-left"/></svg>Cancel</button>
          <button id="btn-save-json" class="primary">Save <svg><use href="#arrow-right"/></svg></button>
        </div>
        <div class="btn-row" style="margin-top:0.5rem;">
          <button id="btn-delete-storage" class="secondary">Delete local storage</button>
        </div>
      </section>

      <!-- ── View: Exercise detail ─────────────────────────────── -->
      <section id="view-exercise" hidden>
        <div id="exercise-detail-card" class="detail-card">
          <p class="exercise-title"><span id="exercise-key"></span> <span id="exercise-short"></span></p>
          <p id="exercise-comment" class="exercise-comment"></p>
          <div class="weight-row">
            <label for="exercise-weight">Weight:</label>
            <input
              type="number"
              id="exercise-weight"
              step="0.5"
              min="0"
            />
            <span class="unit">kg</span>
          </div>
          <div class="weight-row">
            <label for="exercise-set1">Set 1:</label>
            <input
              type="number"
              id="exercise-set1"
              step="1"
              min="1"
            />
            <label for="exercise-set2">Set 2:</label>
            <input
              type="number"
              id="exercise-set2"
              step="1"
              min="1"
            />
          </div>
          <div class="btn-row">
            <button id="btn-cancel" class="secondary"><svg><use href="#arrow-left"/></svg>Cancel</button>
            <button id="btn-done" class="primary">Done <svg><use href="#arrow-right"/></svg></button>
          </div>
        </div>
      </section>
    </main>

    <!--
    Python: type="py"
    MicroPython: type="mpy"
    -->
    <script type="mpy" src="./main.py" config="./pyscript.toml"></script>
  </body>
</html>
